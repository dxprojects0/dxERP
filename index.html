<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DhandaX Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: 'var(--primary)'
            }
          }
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --background: #f8fafc;
        --surface: #ffffff;
        --primary: #1e90ff;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --border: #e2e8f0;
        --success: #16a34a;
        --warning: #f59e0b;
        --danger: #dc2626;
      }
      body {
        background-color: var(--background);
        color: var(--text-primary);
        font-family: 'Manrope', sans-serif;
      }
      .bg-app { background-color: var(--background); }
      .bg-surface { background-color: var(--surface); }
      .text-app { color: var(--text-primary); }
      .text-subtle { color: var(--text-secondary); }
      .border-app { border-color: var(--border); }
      .bg-primary-app { background-color: var(--primary); }
      .text-primary-app { color: var(--primary); }
      .bg-white { background-color: var(--surface) !important; }
      .text-slate-900, .text-slate-800, .text-gray-900, .text-black { color: var(--text-primary) !important; }
      .text-slate-700, .text-slate-600, .text-slate-500, .text-gray-500, .text-gray-600 { color: var(--text-secondary) !important; }
      .border-slate-100, .border-slate-200, .border-gray-200, .border-gray-300 { border-color: var(--border) !important; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar:horizontal { height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: var(--background); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--primary) 45%, transparent); border-radius: 10px; }
      @keyframes blinkPulse {
        0%, 100% { opacity: 1; transform: translateY(0px); }
        50% { opacity: 0.75; transform: translateY(-1px); }
      }
      .animate-blink { animation: blinkPulse 1.8s ease-in-out infinite; }
      @keyframes shimmerMove {
        0% { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      @keyframes marquee {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
      }
      @keyframes heroShift {
        0%, 20% { opacity: 0; transform: translateY(8px); }
        25%, 75% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-8px); }
      }
      @keyframes floatGrid {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes modalUp {
        0% { opacity: 0; transform: translateY(14px) scale(0.98); }
        100% { opacity: 1; transform: translateY(0px) scale(1); }
      }
      .hero-rotator { animation: heroShift 3.2s ease-in-out infinite; }
      .float-grid { animation: floatGrid 3.6s ease-in-out infinite; }
      .shimmer-button {
        background: linear-gradient(110deg, var(--primary) 8%, #5fb3ff 18%, var(--primary) 33%);
        background-size: 500px 100%;
        animation: shimmerMove 2.4s linear infinite;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "uuid": "https://esm.sh/uuid@^13.0.0",
        "@reduxjs/toolkit": "https://esm.sh/@reduxjs/toolkit@^2.11.2",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "react-redux": "https://esm.sh/react-redux@^9.2.0",
        "recharts": "https://esm.sh/recharts@^3.7.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
      }
    }
    </script>
  </head>
  <body class="text-app bg-app antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
